<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetHealthCloud</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

    <h1>PetHealthCloud</h1>
    <p>Pet Health Management System</p>

    <div class="card">
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="password">
        <button>Login</button>
        </div>

        
    <div class="content">

        
    <div class="card">
        <h2>My Pets</h2>
        <button>Load My Pets</button>
        <div id = "petList">
            No data.
        </div>
    </div>
    
    <div class="card">
        <h2>Add Pet</h2>
        <input type="text" placeholder="Pet Name">
        <input type="number" placeholder="Age">
        <input type="number" step="0.1" placeholder="Weight">

        <button>Add Pet</button>
    </div>
    </div>

    

    </div>
</body>
</html>
