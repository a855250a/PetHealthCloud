<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetHealthCloud</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

    <h1>PetHealthCloud</h1>
    <p>Pet Health Management System</p>
            
    <div class="content">
        
    <div class="card">
        <h2>我的寵物</h2>
        <button id="loadPetsButton">載入我的寵物</button>
        <div id = "petList">
            No data.
        </div>
    </div>

        <div class="card">
            <h2>新增寵物</h2>

            <input id="petName" type="text" placeholder="寵物名稱">
            <input id="petAge" type="number" placeholder="年齡">
            <input id="petWeight" type="number" step="0.1" placeholder="體重(kg)">
            <input id="petVaccine" type="text" placeholder="疫苗紀錄">

            <button id="addPetButton">新增寵物</button>
        </div>

    </div>
    
    </div>
    <script src="script.js"></script>
</body>
</html>
